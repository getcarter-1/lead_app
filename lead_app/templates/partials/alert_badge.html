<span id="alert-badge-wrapper"
      hx-get="{{ url_for('alerts.badge') }}"
      hx-trigger="every 60s"
      hx-swap="outerHTML">
  {% if count > 0 %}
  <span class="inline-flex items-center gap-1">
    ⚠️ <span class="bg-red-500 text-white rounded-full px-2 py-0.5 text-xs font-bold">{{ count }}</span>
  </span>
  {% else %}
  Alerts
  {% endif %}
</span>
